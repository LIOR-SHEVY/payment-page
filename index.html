<!DOCTYPE html>
<html>
<head>
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  background: #dcdcdc;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  margin: 0;
}

.box {
  background: linear-gradient(145deg, #111, #1b1b1b);
  padding: 30px;
  border-radius: 16px;
  width: 340px;
  color: white;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
}

.input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 8px;
  color: white;
}

.stripe {
  background: #1c1c1c;
  padding: 14px;
  border-radius: 8px;
  margin-bottom: 15px;
  border: 1px solid #333;
}

.row {
  display: flex;
  gap: 10px;
}

button {
  width: 100%;
  padding: 14px;
  background: #e6e6e6;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: white;
}
</style>
</head>

<body>

<div class="box">
  <div class="title">Credit Card Details</div>

  <input class="input" placeholder="Name on card" />

  <div id="card-number" class="stripe"></div>

  <div class="row">
    <div id="card-expiry" class="stripe" style="flex:1;"></div>
    <div id="card-cvc" class="stripe" style="flex:1;"></div>
  </div>

  <button id="pay">Pay Now</button>
</div>

<script>
const stripe = Stripe("YOUR_PUBLISHABLE_KEY");

const elements = stripe.elements({
  style: {
    base: {
      color: "#fff",
      fontSize: "16px",
      "::placeholder": { color: "#aaa" }
    }
  }
});

const cardNumber = elements.create("cardNumber");
const cardExpiry = elements.create("cardExpiry");
const cardCvc = elements.create("cardCvc");

cardNumber.mount("#card-number");
cardExpiry.mount("#card-expiry");
cardCvc.mount("#card-cvc");

document.getElementById("pay").addEventListener("click", () => {
  alert("Next step → connect payment");
});
</script>

</body>
</html>
